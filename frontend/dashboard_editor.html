<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Editor</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <h1 class="text-4xl font-bold mb-8">
        Panel del Editor
    </h1>

    <div id="contenedorPosts" class="space-y-6">

    </div>

</div>

<script>

async function cargarPostsRevision() {

    try {

        const respuesta =
            await fetch('../backend/obtener_revision.php');

        const posts = await respuesta.json();

        const contenedor =
            document.getElementById('contenedorPosts');

        contenedor.innerHTML = '';

        if (posts.length === 0) {

            contenedor.innerHTML = `
                <div class="bg-white p-8 rounded-2xl shadow">
                    <h2 class="text-2xl font-bold text-gray-500">
                        No hay posts en revisión
                    </h2>
                </div>
            `;

            return;
        }

        posts.forEach(post => {

            const tarjeta = `
            
            <div class="bg-white rounded-2xl shadow p-6">

                <img
                    src="../frontend/${post.imagen_url}"
                    class="w-full h-72 object-cover rounded-xl mb-5"
                >

                <h2 class="text-3xl font-bold mb-3">
                    ${post.titulo}
                </h2>

                <p class="text-gray-600 mb-6">
                    ${post.descripcion}
                </p>

                <div class="flex gap-4">

                    <button
                        onclick="aprobarPost(${post.id})"
                        class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold"
                    >
                        Aprobar
                    </button>

                    <button
                        onclick="rechazarPost(${post.id})"
                        class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold"
                    >
                        Rechazar
                    </button>

                </div>

            </div>
            `;

            contenedor.insertAdjacentHTML(
                'beforeend',
                tarjeta
            );

        });

    } catch(error) {

        console.error(error);

    }

}


async function aprobarPost(id) {

    try {

        const respuesta =
            await fetch('../backend/cambiar_estado_post.php', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    post_id: id,
                    status: 'publicado'

                })

            });

        const resultado = await respuesta.json();

        if (resultado.success) {

            alert('✅ Post aprobado');

            cargarPostsRevision();

        } else {

            alert(resultado.error);

        }

    } catch(error) {

        console.error(error);

    }

}


async function rechazarPost(id) {

    try {

        const respuesta =
            await fetch('../backend/cambiar_estado_post.php', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    post_id: id,
                    status: 'rechazado'

                })

            });

        const resultado = await respuesta.json();

        if (resultado.success) {

            alert('❌ Post rechazado');

            cargarPostsRevision();

        }

    } catch(error) {

        console.error(error);

    }

}


document.addEventListener(
    'DOMContentLoaded',
    cargarPostsRevision
);

</script>

</body>
</html>
