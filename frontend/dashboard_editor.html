<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="img/logo/Logo Lumina - Sin texto.png">
    <title>Lumina - Panel Editor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preload" href="css/base.css" as="style">
    <link rel="stylesheet" href="css/base.css">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css">

    <link rel="preload" href="css/navbar.css" as="style">
    <link rel="stylesheet" href="css/navbar.css">

    <link rel="preload" href="css/editor.css" as="style">
    <link rel="stylesheet" href="css/editor.css">
</head>

<body>
    <header>
        <div class="nav-bg">

            <!-- Logo -->
            <div class="logo">
                <a href="index.html">
                  <img src="img/logo/Logo Lumina (Fondo Blanco) Horizontal - Sin eslogan.png" alt="Logo de la universidad">
                </a>
            </div>
    
            <!-- Barra de búsqueda -->
            <div class="search-container">
                <span class="search-icon material-symbols-outlined">search</span>
                <input class="search" type="search" placeholder="Buscar...">
            </div>

            <nav class="nav-principal">
                <a href="index.html">Inicio</a>
                <a href="login.html">Iniciar Sesión</a>
            </nav>

        </div>
    
    </header>

    <main>
        <div class="contenedor-principal">
            <div class="encabezado-pagina">
                <h1>Panel del Editor</h1>
                <p>Revisa los post y publícalos.</p>
            </div>
            <!-- Termina encabezado -->

            <div id="contenedorPosts" class="space-y-6">

            </div>
            
            <div id="modalAdmin" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <span id="btnCerrar" class="close-modal" onclick="cerrarModal()">&times;</span>
                    <h1 class="modal-title">Editar</h1>

                    <div class="admin-grid">
                        <div class="form-side">
                            <h2>Detalles</h2>

                            <div class="field">
                                <label>Título</label>
                                <input type="text" id="postTitle">
                            </div>

                            <div class="field">
                                <label class="field-titulo">Descripción</label>
                                <textarea id="postDesc"></textarea>
                            </div>

                            <div class="tipo-materia-row">
                                <div class="field">
                                    <label>Tipo</label>
                                    <select id="postTipo">
                                        <option value="articulo">Artículo</option>
                                        <option value="video">Video</option>
                                        <option value="noticia">Noticia</option>
                                        <option value="recurso">Recurso</option>
                                    </select>
                                </div>
                                <div class="field">
                                    <label>Materia</label>
                                    <select id="postMateria">
                                        <option value="1">POO</option>
                                        <option value="2">Servicios de Internet</option>
                                        <option value="3">Ciclo de Vida del Software</option>
                                        <option value="4">Métodos Numéricos</option>
                                        <option value="5">Desarrollo Emprendedor</option>
                                        <option value="6">Sistemas Digitales</option>
                                        <option value="7">Inglés</option>
                                        <option value="8">Orientación y Tutoría</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="preview-side">
                            <div class="preview-card">
                                <img id="imgPreview" src="" alt="Preview">
                            </div>
                            <div class="actions">
                                <button class="btn-save" id="btnGuardarCambiosEditor">Guardar Cambios</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <section class="contenido-footer">
            <h1>Lumina</h1>
            <p>Plataforma de difusión digital académica</p>
        </section>
        <p class="copy">© 2026 Lumina: Claridad a la información</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/menu_ui.js"></script>
    <script src="js/crear.js"></script>
    <script>

    function formatearFecha(fechaStr) {
        if (!fechaStr) return 'Sin fecha';
        const fecha = new Date(String(fechaStr).replace(' ', 'T'));
        if (isNaN(fecha)) return fechaStr;
        return fecha.toLocaleDateString('es-MX', {
            day: 'numeric', month: 'short', year: 'numeric'
        });
    }

    async function cargarPostsRevision() {

        const contenedor =
            document.getElementById('contenedorPosts');

        contenedor.innerHTML = `
            <div class="bg-white p-8 rounded-2xl shadow flex items-center gap-3">
                <span class="material-symbols-outlined animate-spin text-[#2643d4]">progress_activity</span>
                <h2 class="text-2xl font-bold text-gray-500">Cargando posts…</h2>
            </div>
        `;

        try {

            const respuesta =
                await fetch('../backend/obtener_revision.php', {
                    credentials: 'include'
                });

            const posts = await respuesta.json();

            contenedor.innerHTML = '';

            if (posts.length === 0) {

                contenedor.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl shadow">
                        <h2 class="text-2xl font-bold text-gray-500">
                            No hay posts en revisión
                        </h2>
                    </div>
                `;

                return;
            }

            posts.forEach(post => {

                const tarjeta = `
                
                <div class="bg-white rounded-2xl shadow p-6"
                    data-post-id="${post.id}"
                    data-titulo="${(post.titulo || '').replace(/"/g, '&quot;')}"
                    data-descripcion="${(post.descripcion || '').replace(/"/g, '&quot;')}"
                    data-imagen="${(post.imagen_url || '').replace(/"/g, '&quot;')}"
                    data-tipo="${post.tipo || 'articulo'}"
                    data-categoria-id="${post.categoria_id || 1}"
                >

                    <img
                        src="../frontend/${post.imagen_url}"
                        class="w-full h-72 object-cover rounded-xl mb-5"
                    >

                    <h2 class="text-3xl font-bold mb-3">
                        ${post.titulo}
                    </h2>

                    <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm text-gray-500 mb-4">
                        <span class="flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-base">person</span>
                            ${post.autor || 'Autor desconocido'}
                        </span>
                        <span class="flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-base">school</span>
                            ${post.materia || 'Sin materia'}
                        </span>
                        <span class="flex items-center gap-1.5 capitalize">
                            <span class="material-symbols-outlined text-base">sell</span>
                            ${post.tipo || 'articulo'}
                        </span>
                        <span class="flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-base">calendar_today</span>
                            ${formatearFecha(post.fecha_creacion)}
                        </span>
                    </div>

                    <p class="text-gray-600 mb-6">
                        ${post.descripcion}
                    </p>

                    <div class="flex gap-4">

                        <button
                            onclick="aprobarPost(${post.id})"
                            class="bg-[#2643d4] hover:bg-[#0f3ab5] text-white px-6 py-3 rounded-xl font-bold transition"
                        >
                            Aprobar
                        </button>

                        <button
                            onclick="rechazarPost(${post.id})"
                            class="bg-[#e94141] hover:bg-[#c62f2f] text-white px-6 py-3 rounded-xl font-bold transition"
                        >
                            Rechazar
                        </button>

                        <button
                            onclick="abrirModalEdicion(this)"
                            class="bg-[#e9e9f1] hover:bg-[#d8d8e4] text-[#001430] px-6 py-3 rounded-xl font-bold transition"
                        >
                            Editar
                        </button>

                    </div>

                </div>
                `;

                contenedor.insertAdjacentHTML(
                    'beforeend',
                    tarjeta
                );

            });

        } catch(error) {

            console.error(error);

            contenedor.innerHTML = `
                <div class="bg-white p-8 rounded-2xl shadow">
                    <h2 class="text-2xl font-bold text-red-500">
                        Error al cargar los posts. Intenta recargar la página.
                    </h2>
                </div>
            `;

        }

    }


    async function aprobarPost(id) {

        try {

            const respuesta =
                await fetch('../backend/cambiar_estado_post.php', {

                    method: 'POST',
                    credentials: 'include',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({

                        post_id: id,
                        status: 'publicado'

                    })

                });

            const resultado = await respuesta.json();

            if (resultado.success) {

                alert('✅ Post aprobado');

                cargarPostsRevision();

            } else {

                alert(resultado.error);

            }

        } catch(error) {

            console.error(error);

        }

    }


    async function rechazarPost(id) {

        const observaciones = prompt('Ingrese la observación o motivo de rechazo para el autor:');
        if (observaciones === null) {
            return;
        }

        if (observaciones.trim() === '') {
            alert('Debes ingresar una observación para rechazar.');
            return;
        }

        try {

            const respuesta =
                await fetch('../backend/cambiar_estado_post.php', {

                    method: 'POST',
                    credentials: 'include',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({

                        post_id: id,
                        status: 'rechazado',
                        observaciones: observaciones.trim()

                    })

                });

            const resultado = await respuesta.json();

            if (resultado.success) {

                alert('❌ Post rechazado');

                cargarPostsRevision();

            } else {

                alert(resultado.error || 'Error al rechazar el post');

            }

        } catch(error) {

            console.error(error);

        }

    }

    // Variable para guardar el ID del post que estamos editando
    let postEditandoId = null;

    function abrirModalEdicion(boton) {
        const tarjeta = boton.closest('[data-post-id]');
        postEditandoId = tarjeta.dataset.postId;

        document.getElementById('postTitle').value = tarjeta.dataset.titulo;
        document.getElementById('postDesc').value = tarjeta.dataset.descripcion;
        document.getElementById('imgPreview').src = tarjeta.dataset.imagen || '';
        document.getElementById('postTipo').value = tarjeta.dataset.tipo || 'articulo';
        document.getElementById('postMateria').value = tarjeta.dataset.categoriaId || '1';

        document.getElementById('modalAdmin').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modalAdmin').style.display = 'none';
    }

    document.getElementById('btnGuardarCambiosEditor').onclick = async function() {
        const titulo = document.getElementById('postTitle').value.trim();
        const descripcion = document.getElementById('postDesc').value.trim();

        if (!titulo || !descripcion) {
            alert('Completa todos los campos');
            return;
        }

        try {
            const tipo = document.getElementById('postTipo').value;
            const categoria_id = document.getElementById('postMateria').value;

            const respuesta = await fetch('../backend/editar_post_editor.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    post_id: postEditandoId,
                    titulo,
                    descripcion,
                    tipo,
                    categoria_id
                })
            });

            const resultado = await respuesta.json();

            if (resultado.success) {
                alert('✅ Cambios guardados');
                cerrarModal();
                cargarPostsRevision();
            } else {
                alert('❌ Error: ' + resultado.error);
            }
        } catch (error) {
            console.error(error);
            alert('❌ Error al conectar con el servidor');
        }
    };


    document.addEventListener(
        'DOMContentLoaded',
        cargarPostsRevision
    );

    </script>

</body>
</html>
