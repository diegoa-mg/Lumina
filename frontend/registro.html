  <body>
    <header>
        <div class="nav-bg">

            <div class="logo">
                <a href="index.html">
                  <img src="img/logo/Logo Lumina (Fondo Blanco) Horizontal - Sin eslogan.png" alt="Logo de la universidad">
                </a>
            </div>
            
            <nav class="nav-principal">
                <a href="index.html" data-i18n="nav.inicio">Inicio</a>
            </nav>

        </div>
    </header>

    <main class="flex items-start justify-center bg-gray-100 py-12">
      <div class="relative flex flex-col m-6 space-y-8 bg-white shadow-2xl rounded-2xl md:flex-row md:space-y-0">

        <div class="flex flex-col justify-center p-8 md:p-14">
          <span class="mb-3 text-4xl font-bold" data-i18n="registro.titulo">Registrarse</span>
          <span class="font-light text-gray-400 mb-8" data-i18n="registro.bienvenida"> ¡Bienvenido! Por favor ingresa tus datos</span>

          <!-- Formulario Registro -->
          <form action="../backend/registro_usuario_be.php" method="POST">

            <div class="py-4">
              <span class="mb-2 text-md" data-i18n="registro.nombre">Nombre</span>
              
              <input type="text" name="nombre" id="name"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="py-4">
              <span class="mb-2 text-md" data-i18n="registro.usuario">Nombre de usuario</span>
              
              <input type="text" name="usuario" id="username"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="py-4">
              <span class="mb-2 text-md" data-i18n="login.correo">Correo</span>
              
              <input type="text" name="correo" id="email"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="py-4">
              <span class="mb-2 text-md" data-i18n="login.password">Contraseña</span>
              
              <div class="password-field">
                <input type="password" name="password" id="pass"
                class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
                <button type="button" class="password-toggle" data-password-toggle="pass" aria-label="Mostrar contraseña" aria-pressed="false">
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>

            
            <button type="submit"
            class="w-full bg-black text-white p-2 rounded-lg mb-6 border border-black hover:bg-white hover:text-black hover:border hover:border-gray-300">
              <span data-i18n="registro.btn">Registrar</span>
            </button>

          </form>

          <div class="text-center text-gray-400">
            <span class="font-bold text-black"></span>
          </div>

        </div>

        <div class="relative hidden md:flex items-center justify-center pr-10">
          <img src="img/logo/Logo Lumina - Sin texto.png"
          class="w-[300px] h-auto rounded-r-2xl object-contain"/>
        </div>

      </div>
    </main>

    <footer class="footer">
      <section class="contenido-footer">
        <div class="footer-brand">
          <h1>Lumina</h1>
          <p data-i18n="footer.tagline">Plataforma de difusión digital académica</p>
        </div>
        <nav class="footer-links footer-links--guest" aria-label="Enlaces del sitio" data-i18n-aria="footer.aria_enlaces">
          <div class="footer-link-group">
            <a href="index.html" data-i18n="nav.inicio">Inicio</a>
            <a href="login.html" data-i18n="nav.iniciar_sesion">Iniciar Sesión</a>
            <a href="registro.html" data-i18n="nav.registrarse">Registrarse</a>
          </div>
        </nav>
      </section>
      <p class="copy" data-i18n="footer.copy">© 2026 Lumina: Claridad a la información</p>
    </footer>
    <script src="js/i18n.js?v=10"></script>
    <script src="js/auth.js?v=10"></script>
    <script src="js/password-toggle.js"></script>
  </body>
</html>
