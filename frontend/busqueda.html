<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="img/logo/Logo Lumina - Sin texto.png">
    <title>Lumina - Búsqueda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preload" href="css/base.css" as="style">
    <link rel="stylesheet" href="css/base.css">
    <link rel="preload" href="css/styles.css?v=4" as="style">
    <link rel="stylesheet" href="css/styles.css?v=4">

    <link rel="preload" href="css/navbar.css" as="style">
    <link rel="stylesheet" href="css/navbar.css">
</head>
<body>

    <!-- Menú de Navegación -->
    <header>
        <div class="nav-bg">

            <!-- Logo -->
            <div class="logo">
                <a href="index.html">
                    <img src="img/logo/Logo Lumina (Fondo Blanco) Horizontal - Sin eslogan.png" alt="Logo de la universidad">
                </a>
            </div>

            <!-- Barra de búsqueda -->
            <div class="search-container">
                <span class="search-icon material-symbols-outlined">search</span>
                <input id="searchInput" class="search" type="search" placeholder="Buscar...">
            </div>

            <nav class="nav-principal">
                <a href="index.html">Inicio</a>
                <a href="login.html" id="nav-sesion">Iniciar Sesión</a>
            </nav>

        </div>
    </header>

    <main class="contenedor-principal" style="padding: 3rem 2rem;">
        <div id="resultados-titulo" class="encabezado-pagina">
            <h1>Resultado de búsqueda</h1>
            <p id="resultados-subtitulo"></p>
        </div>

        <div id="resultados-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-gray-400 col-span-full text-center py-16">Cargando...</p>
        </div>

    </main>

    <footer class="footer">
        <section class="contenido-footer">
            <h1>Lumina</h1>
            <p>Plataforma de difusión digital académica</p>
        </section>
        <p class="copy">© 2026 Lumina: Claridad a la información</p>
    </footer>

    <script src="js/menu_ui.js"></script>
    <script src="js/auth.js"></script>

    <script>
        function escapeHtml(valor) {
            return String(valor ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function formatearFecha(fecha) {
            if (!fecha) return '';
            const fechaObj = new Date(fecha.replace(' ', 'T'));
            if (Number.isNaN(fechaObj.getTime())) return fecha;
            return fechaObj.toLocaleDateString('es-MX', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
        }

        function descripcionCorta(texto) {
            const limpio = String(texto ?? '');
            return limpio.length > 125 ? `${limpio.substring(0, 125)}...` : limpio;
        }

        function renderCard(post) {
            const imagen = post.imagen_url || 'img/clases/clase2.webp';
            const tipo = post.tipo || 'articulo';
            const autor = post.autor || 'Autor desconocido';
            const autorFoto = post.autor_foto || '';
            const materia = post.materia || 'Sin materia';
            const fecha = formatearFecha(post.fecha_creacion);

            const avatarAutor = autorFoto
                ? `<img src="${escapeHtml(autorFoto)}" class="w-8 h-8 rounded-full object-cover" alt="${escapeHtml(autor)}">`
                : `<div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center">
                       <span class="material-symbols-outlined text-gray-500 text-lg">person</span>
                   </div>`;

            return `
                <article class="bg-white rounded-2xl shadow-lg overflow-hidden hover:-translate-y-2 hover:shadow-2xl transition-all duration-500 flex flex-col">
                    <img src="${escapeHtml(imagen)}" class="w-full h-60 object-cover" alt="Imagen publicación">

                    <div class="p-5 flex flex-col flex-1">
                        <div class="flex justify-between items-center mb-3">
                            <span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded">
                                ${escapeHtml(tipo.toUpperCase())}
                            </span>
                        </div>

                        <h3 class="text-lg font-bold text-gray-900 leading-tight mb-4">
                            ${escapeHtml(post.titulo)}
                        </h3>

                        <div class="flex items-center gap-2 mb-4">
                            ${avatarAutor}
                            <div>
                                <p class="text-sm font-semibold">${escapeHtml(autor)}</p>
                                <p class="text-xs text-gray-400">${escapeHtml(fecha)}</p>
                            </div>
                        </div>

                        <p class="text-sm text-gray-600 leading-relaxed flex-1">
                            ${escapeHtml(descripcionCorta(post.descripcion))}
                        </p>

                        <div class="flex justify-end mt-3">
                            <span class="max-w-full truncate bg-blue-50 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full">
                                ${escapeHtml(materia)}
                            </span>
                        </div>
                    </div>
                </article>
            `;
        }

        async function buscar(q) {
            const grid = document.getElementById('resultados-grid');
            const tituloH1 = document.querySelector('#resultados-titulo h1');
            const subtitulo = document.getElementById('resultados-subtitulo');

            if (tituloH1) tituloH1.textContent = `Resultados para: "${q}"`;
            grid.innerHTML = '<p class="text-gray-400 col-span-full text-center py-16">Buscando...</p>';

            try {
                const res = await fetch(`../backend/buscar.php?q=${encodeURIComponent(q)}`);
                const posts = await res.json();

                if (!posts.length) {
                    subtitulo.textContent = 'No se encontraron publicaciones.';
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-24 text-gray-400">
                            <span class="material-symbols-outlined text-6xl block mb-4">search_off</span>
                            <p class="text-xl">Sin resultados para "<strong>${escapeHtml(q)}</strong>"</p>
                            <p class="text-sm mt-2">Intenta con otras palabras clave.</p>
                        </div>
                    `;
                    return;
                }

                subtitulo.textContent = `${posts.length} publicación${posts.length !== 1 ? 'es' : ''} encontrada${posts.length !== 1 ? 's' : ''}.`;
                grid.innerHTML = posts.map(renderCard).join('');

            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p class="text-red-400 col-span-full text-center py-16">Error al buscar. Intenta de nuevo.</p>';
            }
        }

        const params = new URLSearchParams(window.location.search);
        const query = params.get('q')?.trim() || '';

        const inputBusqueda = document.getElementById('searchInput');
        if (inputBusqueda && query) inputBusqueda.value = query;

        if (query) {
            buscar(query);
        } else {
            const h1Vacio = document.querySelector('#resultados-titulo h1');
            if (h1Vacio) h1Vacio.textContent = 'Búsqueda';
            document.getElementById('resultados-subtitulo').textContent = 'Escribe algo en la barra de búsqueda y presiona Enter.';
            document.getElementById('resultados-grid').innerHTML = '';
        }
    </script>

</body>
</html>
